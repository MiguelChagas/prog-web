<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treinador de Mira</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div id="hud">
        <h2>Pontuação: <span id="score">0</span></h2>

        <h2>Vidas: <span id="lives">3</span></h2>
      </div>

      <div id="game-area"></div>

      <div id="ranking-container">
        <h3>🏆 Melhores Pontuações</h3>
        <ol id="ranking-list">
          <li>Nenhuma partida concluída</li>
        </ol>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
